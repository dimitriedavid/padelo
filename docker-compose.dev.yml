services:
  frontend:
    build:
      context: ./frontend
      target: deps
    command: pnpm dev
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://backend:8123
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      target: deps
    command: pnpm run dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-padelo}:${POSTGRES_PASSWORD:-padelo}@postgres:5432/${POSTGRES_DB:-padelo}
      HOST: 0.0.0.0
      NODE_ENV: development
      PORT: 8123
    ports:
      - "${BACKEND_PORT:-8123}:8123"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-padelo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-padelo}
      POSTGRES_USER: ${POSTGRES_USER:-padelo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  backend_node_modules:
  frontend_node_modules:
  postgres_data:
