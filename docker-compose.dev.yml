name: padelo-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DEV_POSTGRES_DB:-padelo}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-padelo}
      POSTGRES_USER: ${DEV_POSTGRES_USER:-padelo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DEV_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
