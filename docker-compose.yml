services:
  backend:
    build:
      context: ./backend
    command: pnpm run dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://padelo:padelo@postgres:5432/padelo
      HOST: 0.0.0.0
      NODE_ENV: development
      PORT: 8123
    ports:
      - "8123:8123"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: padelo
      POSTGRES_PASSWORD: padelo
      POSTGRES_USER: padelo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padelo -d padelo"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  backend_node_modules:
  postgres_data:
