services:
  frontend:
    build:
      context: ./frontend
      target: runner
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
      cloudflare:
        aliases:
          - padelo-frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: runner
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 8123
    networks:
      default:
      cloudflare:
        aliases:
          - padelo-backend
      timescaledb:
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8123/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      target: build
    command: pnpm db:migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    networks:
      default:
      timescaledb:
    profiles:
      - migrate

networks:
  cloudflare:
    external: true
    name: cloudflared_cloudflare
  timescaledb:
    external: true
    name: main-timescaledb
