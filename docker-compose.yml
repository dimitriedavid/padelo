services:
  frontend:
    build:
      context: ./frontend
      target: runner
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
      cloudflare:
        aliases:
          - padelo-frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: runner
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-padelo}:${POSTGRES_PASSWORD:-padelo}@postgres:5432/${POSTGRES_DB:-padelo}
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 8123
    networks:
      default:
      cloudflare:
        aliases:
          - padelo-backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8123/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      target: build
    command: pnpm db:migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-padelo}:${POSTGRES_PASSWORD:-padelo}@postgres:5432/${POSTGRES_DB:-padelo}
    profiles:
      - migrate

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-padelo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-padelo}
      POSTGRES_USER: ${POSTGRES_USER:-padelo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  cloudflare:
    external: true
    name: cloudflared_cloudflare
